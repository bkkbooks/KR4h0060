珍篚厥紵絺第難酬於囊錦田起東執事崐玉無瑕壺氷徹底詩材抉剔麵繭泥牛物態牢籠田烏桑扈總是清新之句足覘灑落之懷某識韓雖賖説項不置贈我以繡段所愧報瓊好賢如緇衣敢忘獻苧餘如頴輩并致籖房唐楚友田園春日偶爾分題湖海名流翩其入社長城自屹前敵無勍執事塵厭軟紅節存清白其楚波之及於晉有堯風而謂之唐雜興悠然社村耕事一聨佳甚栁處蛙時意復寓於隂晴誰敢言其非是識字耕夫農圃餘生結同盟之吟友湖山佳處有識字之畊夫所謂伊人夫豈卑我執事語無排奡體不效崑野鷺山鶯動金谷當年之感婦蠶夫秫逼石湖春日之吟和易所形清奇可愛云云學古翁執事秀毓蒼泱奥探眇忽謂衆作追隨世好非愚則諛而八詩模冩農時以俗為雅一臠固知於鼎味寸莛猶咽於鐘音某云云無青玉案徒慚玖珮之貽有古錦囊應笑紵衣之獻社翁執事氣孕蒼泱學宗葩正以俗為雅一年先百事之書因險出奇八句盡三春之景真成巧中奚取多為云云式如金玉庸起敬於席珍貢厥紵絺亦難酬於段繡束毫不腆鏤本云初奉以敷陳尚惟鑒在騎牛翁伏以月泉舊社乆依文字之輝春日新題洊寫田園之興如五雜組敵雙南金執事刺手鯨牙射光牛背覺東風之吹夢寧不委心對夕暉而忘言還有真意埽空俗韻増重齊盟某披吟以還起敬無斁觚不觚而堪歎乃令識良梓之斧斤布不布則已微所願應深衣之繩矩束毫匪腆鏤板再供天目山人月泉社友爰㰱舊盟天目山人為題春興不勝佳甚豈果逺而執事望邑鄰輝平齋宗派詠牛羊茁壯仍觀戯水之乳鵞知燕雀生成又喜巡簷之窠蜜有嗿其饁或拊而歌安定書隠執事昔者中庸今之安定趣雄物表牛倦鳥喧景入用中風微水滑且能慕義熙之士豈欲追正始之音槐忩居士執事名稱東國越之雄句比西家施之麗浴蠶飛燕野色搖春依犢市蛆扉隂移月摹成小景曲盡巧心姜仲澤月泉里社竊雙溪明月之餘輝春日田園動白雪陽春之絶唱云云執事採摭羣言牢籠百態歸燕忙睡牛穏頗歡顔社酒之甞斷煙濕流水香更切齒村莊之吠髙標聳若秀句宜哉陳柔著月泉舊社惠儌湖海之同盟春日新題駿發田園之雜興方尚老執事云云秧疇麥稜畫圗巧寄於聲中社酒農書詩史隠存于言外烏龍嶺之地靈尚矣白雲村之宗派依然某薄云苧獻并以頴歸朱孟翁愛雲仙友農圃餘年惠儌同社江湖偉士駿發髙吟此五言詩可萬人敵執亊愛雲自命與世相違卧碧畊青慣尋幽趣摘鮮甞煮閒對芳時宛如驢上風雪詩不帶人間煙火氣某未及識面已相知心縱有紫磨難荅綺琴之逺贈雖微白㲲敢隨毛穎以前陳輶凟悚然鑒存幸甚回送詩賞劄羅公福讀淵明詩久識田園之趣從夫子學願為農圃之民未敢望其下風胡遽延之上座執事雅懷月霽清思泉寒撫景興思慨唐科之不復以詩為試覬同雅之可追竊知扶植之盛心正欲主維乎公是某羨珠玉之在側忝糠粃之播前舊擬秋聲曽占桐江之風景新題春日又分婺女之星輝豈好為朱公之變姓易名深恐蹈栁子之召閙取怒慙非重寳俾獲與錦囊之榮賜侈香羅復喚起青衫之夢受絲毫而皆感與筆墨以忘言謹述謝私伏祈鑒在司馬澄翁品題得佳士公方司風月之盟塗抹如阿㜑自笑得田園之樂寘諸榜眼壯此詩脾執事襟韻石湖標儀栗里腰嫌束帶寸榮不入於夢中酒無燥尊諸公要出我門下某濁慙繡水清傍月泉借來青之矮屋三間閒鑽故紙想環翠之卧樓百尺分合下牀有來駢四儷六之文濫中拔十得五之選錄其善者願為吟社之門生羅而致之景仰騷壇之座主恩欲酬於奪錦敬少俟於摳衣髙宇賦月泉之雜興問一得三觀詩社之題名吾十有五鑒明攸在雨射奚工恭惟先輩墨綬銅章綸巾羽扇樓髙風月清標逺邁於隠矦春滿田園佳趣適同於陶令吟盟是宰公道以明某信手推敲何心得失誤入品題之列有何格調之髙愧甚少年的非老手衮褒匪稱鼎貺謂何苧細羅香寔過鄭僑之縞帶筆精墨妙粲垂郇氏之綵箋三復以還一忱兼謝參前未卜能照是祈山南埜逸横山有呉佚老著名東萊太史之文南塘稱劉潛夫留意盛唐諸公之作頃因月泉之續社分示石湖之舊題有栗里輞川之風老子興復不淺無魏野林逋之句吾黨斐然成章詎意惡詩亦占前列旣不迷五色而失方叔抑且出一頭而放子瞻狎墜華緘過勤褒衮裂絹喜朶雲之到手唘匳駭疊雪之浮香兼有煙翰之珍逺賁柴荆之陋旌儀侈甚刋册粲然勉用拜嘉豈勝銜感美人贈繡段心匪吝於巻還小奚背錦囊句尚慙於拾得未涯申謝并冀丙融子進牛邉寫景敢言琢句之工龜列標名似直賞音之誤無心得此有目榮之恭惟某春滿河陽趣髙彭澤謂六義之中有興風雅則然豈三代之後無詩田園故在胡取蕨薇之采不令葑菲之遺札墜飛雲香分疊雪某靦顔褒寵拜手登嘉當春服之成時既竭兩端之教窺潛齋之深處敢忘一字之師栗里騷壇元帥獨主夏盟里社晚生謾吟春興媿無好語誤辱賞音敬惟執事吳下華宗洛中耆德因詩取友髙拍方𤣥英之肩下筆如神叅透范石湖之體吟哦不輟鑒裁尤精某自顧濫竽敢當褒衮香羅委貺更兼𤣥頴之珎繡段雖華愧乏瓊瑤之報倪梓山堂隠廬未醒白木鑱之夢月泉詩社許沾青玉案之榮名殿七賢才空八斗恭惟執事吟髯似㦸笑面如靴彭澤歸去來遂尋壑經丘之趣廬峰老其下拓買田築室之規某曾借屐於東山且叨尊於北海篆銘未已褒賞謂何纎縞勤渠既出吳延陵之賜瓣香皈向當如陳師道之言全泉翁田園將蕪穹節羨陶翁之賦池塘生草浪吟慙靈運之才品題侈甚於衮華愧靦凛乎其甲厚自大雅不作乆矣歎絶響以無聞然小子何莫學夫覺用心之徒苦謾爾警一鳴於楚豈期次八米之盧敬惟執事心醉六經眼空四海學探月窟吐老桂之秋芬詞湧泉源障狂瀾之東倒小退青雲之步甘為緑野之逰隨栁傍花舞雩風於春莫裁雲剪霧主吟社之夏盟妙選穿楊亦兼采菲如某者麄工蟲刻頗學蚓鳴其聲嗚嗚然安知格調之别所言平平耳何有見趣之髙誰歟㸃朱衣之頭幸矣殿龜頭之目人謂採珠之偶得我慚奪錦之罔功試擲地當作金聲難造興公之妙如舊識與之縞帶敢忘季子之知或承之羞未知所報吕澹齋夏盟有主池塘之舊夢喚醒春興無邊田園之新吟閱遍自愧非壇場之作手亦浪叨鄉黨之榮名云云方賞仲尼刪後誰明雅頌之遺音元亮歸來自得田園之真趣廼作成於後進爰宗主於芳盟敢圗樸􅈪之林誤玷鈞陶之選恭惟云云如某者偶捐農圃強就檠忩讀豳什者半生僅知諷詠拜劉公之一紙過辱品題有來厚賞之逺貽頓覺窮櫩之暴富輕衫裁白紵敢忘今日之恩方冊對青燈庶亦他時之報喻似之學吟農圃政欠推敲布武壇場誤䝉鑒賞寵榮殊甚登領赧然恭惟執事陶徑春融宓琴調古植月泉之赤幟足張吾軍續風雅之清音旁招同社士每難於知已公獨譽其過人顧此斗筲曷當筐篚某栖遲分水企仰仙華詩可以興幸囊封於古錦服之無斁敬紳佩於深衣躡雲君詩大國難為入社之才吾學老農頗識歸田之趣居慙出醜浪被褒嘉恭惟執事遺蛻浮榮潛心大雅以六義之中曰興能感性情而一年之計在春盍知稼穡旣率芸子蕘夫而分其席且招騷人墨客而與之盟刻在新編傳為佳話某學嗟晚士思苦㝠搜奪延靖之錦袍愧無傑句分延陵之衣苧徒佩盛心得此何脩服之無斁使毛頴陳𤣥同傳尚欲發揚與長沮桀溺耦畊終甘隠逸謝言不足宥鑒是祈玉華吟客大將登壇孰匪當家之作偏師失律敢希醲賞之頒兹誤辱於搜羅第倍增於慙悚適情聊爾於畦逕以未知寄興謂何亦田園之謾慰豈料暗中之摸索猶為望後之嬋娟寫白紵詞就命文房之二益酬絲箋寄難同筆法之雙鈎語謝渠渠占辭草草唐楚友大鐸采詩喜三百篇之典型復見達圖結社數十八賢之地位偶同豈湖海之乏人寔菲葑之下體香浮雲朶光挾星躔得之若驚愧無以稱顧苦吟寫閒中之情性而躬畊亦分内之生涯題命田園興尋筆硯有以自樂頗慙九首之俱前無非至公敢恥八名之在後若曰廷玉良笑冶金流水桃花誰其具眼蛙時栁處已是知音瓦礫多辱於品題篚筐例承於頒寵寳之遺子期在傳家誦雪鬢四袠之詩别才頻減評煙草六朝之句良晤匪遙謹此申酬伏祈丙在鄧草逕月下分泉清甚詩翁之致逕中藉草淒其田父之儔離奇方有愧於鄧林品題乃獲班於崑玉恭惟執事胄髙姬長派接唐英秋風歸栗里之田乆灰官夢春日動石湖之興載㰱騷盟雅道有賴扶持類句亦䝉甄錄某愧非范蠡旣名鴟夷又名陶朱大類燕人先誑國城復誑里社驢馬亦直戲耳熊魚乃兩得之覆瓿増慙擊轅獻笑青山白紵荷見眷之不涼烏玉紫毫姑即施以為報草兹布復莫旣謝私識字畊夫留心大雅聿追三百篇之遺僂指同盟辱寘十九人之列視前茅而有靦感下菲之居多敬惟執事文思湧泉書眼如月唐英嗣響擅歌詩之芳名彭澤賦歸得田園之真樂尚友湖海之士相期文字之交許後進以言詩凡先登者有賞敢期庸下亦預選中某識字畊夫學詩小子客邊夜雨惟海陽二頃之田湖上春風續𤣥都再來之句豈真得意誤䝉賞音榮哉華衮之褒感甚白紵之賜貳以𤣥頴銘之肺肝小好小慙固已在羣譏之數曰比曰興所願聞六義之言學古翁效休文之八詠知類農歌拔毛遂於衆中允髙匠目矧謝池僅止五字而魯語尤戒多為首而録全思則過半恭惟執事雙桐政美五栁門深續雅道於一綫之餘亦言其興尋吟盟於千里之外夫豈無人乃采艱辛之辭特置次癸之列月泉分貺雲壑懷慚某夢斷鈞天心逰樂地視𤣥穎可為至寳奚有于今裁白紵而製深衣於焉學古社翁雲岫無心夙羨淵明之先見月泉入社偶居毛遂之後塵云云騎牛翁彭澤賦歸飽田園之真樂廣文坐冷瀕溝壑以猶歌適騷伯之建壇縱吟翁之劘壘不知技癢聊遣旅懷牛從陳舜舉之騎頗諳幽興魚效韓昌黎之釣良用自悲過眼之日無迷在手之月可掬雖愧於萬選萬中幸列之二十二人迺厪寵翰之臨過沐賞音之賁將之禮幣感此誼襟紅帛弗施且見頒於綵筆青衫無用尚托庇於深衣僕僕拜嘉惓惓言謝天目山人枯腸索句未除石氏之村褒筆過情為揜徐凝之惡俾陪前列以勸後生恭惟執事温詩社盟嗣騷壇響獨得田園之興掲以為題遍行郡邑之間聞者皆作至令猥瑣亦強精神某云云負才非夷簡麄無慙叔父之薦揚典試得歐陽幸不遇主人之黜落安定書隠田園動興得專風月之盟湖海倦逰未接雲霄之武辱招吟社敢詫長城敬惟執事氣㮣雄豪襟期光霽種花多暇賸留潘縣之濃隂夢草生春拈起謝池之舊話比司文之有在咸賈勇以先登某非其人而居此選侈白絹斜封之寵敬用珍藏慕深衣獨樂之風益深銘佩槐忩居士執事云云彭澤琴書歸去不孤長嘯石湖風月邇來轉入清吟姜仲澤某云云范詩凡廿四首之多我甘落後戴席半五十人之數何敢爭先誤辱衮褒特勤旌勸麻衣如雪逺勝牛背之蓑筆陣掃雲好寫兎園之册陳柔著仰止潛翁酌水夙稱於處黙慙非著姓求田自笑於元龍曾謂推敲猥䝉品藻恭惟執事以義熙人物續呉下風流七步成詩一變至道石湖有作雖聞託興於田家月泉以前幾見盟詩於春日力扶大雅誤采陳言某豈無異聞於鯉庭亦有一經於牛角即老圃寒花之句還以祝君歌青山白紵之章惠而好我永言感著曷既揄傳方尚老泉流明月獨分詩派之清村隠白雲逺借騷盟之重誰為堊斵忽拜衮褒恭惟執事富貴故鄉風流别墅念寥寥大雅乆亡山川草木之風而勉勉後生俾識榖粟桑麻之理載舉石湖之雜興稍舒彭澤之閒情不鄙互鄉亦為同社某章逢晚學句律新知無二十八宿之奇胸曷膺厥選作數千百年之佳話端在斯編誇之老農有此盛事天吳翻短褐頓更白紵之華霜兎禿長毫難寫青琅之報函脩謝幅伏冀照原朱孟翁某子産惠人也紵頒奚啻衮榮毛君中書耶頴秃曷殫瓊報愛雲仙友田園歸隠夙欽彭澤之髙風筆硯乆荒難得石湖之秀句不慙鄙劣冒爾擬騷誤入甄收敢言奔殿敬惟執事山林富貴軒冕錙銖釣月畊雲詎輸製錦傍花随栁雅稱調琴可見知幾之老成居然逺世而肥遯遹憑佳興用拂清人餌絲枲釣江湖貨𤣥頴貿珠璧此意古矣其利溥哉某溝壑餘生泥塗下役有懷農圃靡就犂鉏兹效顰唐士之五言恰輳足周耼之一轂僅逃孫外免愧盧前自謂狂吟思復青氊而逺矣或云駝榜㑹歌白紵以誇之月泉吟社詩
