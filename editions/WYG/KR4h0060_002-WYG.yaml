  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0060_WYG_002-1a, image: WYG1359/WYG1359-0621a.png}
body:
  text: 月泉吟社詩宋吳渭編春日田園雜興律五七言四韻餘體不取第一名羅公福杭清吟社三山連文鳳伯正號應山評曰衆傑作中求其粹然無疵極整齊而不窘邊幅者此為冠老我無心出市朝東風林壑自逍遥一犂好雨秧初種幾道寒泉藥旋澆放犢曉登雲外壟聽鶯時立栁邊橋池塘見説生新草已許吟魂入夢招第二名司馬澄翁義烏馮澄字澄翁號來青起善包括兩聨説田園的而雜興寓其中末語亦不汎編闌春思倩吟鞭著面和風軟似綿黄犢烏犍秧榖候雄蜂雌蝶菜花天把鉏健婦踏煙壟抱甕丈人分野泉忙事闗心在何處流鶯不聽聽啼鵑第三名髙宇杭州西塾梁相字必大前聨妙於紐合後聨引陶范不為事縛句法更髙末借言雜興的是老手膏雨初晴布榖啼村村景物正熈熈誰知農圃無窮樂自與鶯花有舊期彭澤歸來惟種栁石湖老去最能詩桃紅李白新秧緑問著東風總不知第四名仙村人古杭白雲社頷聨十字一毫不費力自與粘泥體者不同餘見雜興芳草東郊外疎籬野老家平疇一尺水小圃百般花青箬閒畊雨紅裙鬬采茶村村寒食近挿栁遍檐牙第五名山南隠逸義烏劉應龜字元益號山南此巻七言凡六首律細韻髙如畊餘樹有牛磨癢税足溪無人照瘢青春却付鳴鳩管白日全輸卧犢門此等語夐未易及鼎嘗一臠餘可㮣知獨犬寥寥晝護門是間也自有桃源梅藏竹掩無多路人語雞聲又一村屋角枯藤粘樹活田頭野水入溪渾我來拾得春風句分付沙鷗莫浪言第六名子進分水魏石川先生名新之字德夫起有頓挫二聨善琢句善鍊字末意尤永農圃誰言與世違韶華正恐屬柴扉天機花外聞幽哢野色牛邊睨落暉膏雨平分秧水白光風小聚藥苗肥行歌隠隠前村暖忽省深山有蕨薇第七名栗里金華楊龍溪名本然舜舉起叙石湖出處善粘綴本題頷聨引淵明為對語有斟酌頸聨就范詩狀田園結有悠揚不盡之興此詩若止如前半篇則於義當屬賦矣春風建業馬如飛誰肯田園拂袖歸栗里乆無彭澤賦松江僅有石湖詩踏歌槌鼓麥秧緑沽酒裹鹽菘芥肥吳下風流今莫續杜鵑啼處草離離第八名倪梓義烏陳堯道字景傳號山堂起聨有力五六亦新傍花隨栁人多正説此乃翻用之意新化日邨田樂春風畊織圖秧肥蝌斗動桑暗鵓鳩呼罷社翁分胙占蠶媪得符傍花隨栁處此事不闗吾第九名全泉翁孤山社名璧字君玉號遯初子見趣髙格調别觀前聨八字及末句語可想其人倦逰歸隠白雲鄉芳草庭閒晝日長晉世衣冠門外栁豳人風俗屋邊桑青林伐鼓村村社緑水平疇處處秧未分東風欺老眼一編牛背卧斜陽第十名吕澹翁東陽名文老引用田園事全與諸作不同覃思一致於此末句亦縝密月筩紀閏附青煒民野陶然化日熈祀備枌榆祈稔嵗宴酣花栁樂清時洛中富貴斜陽恨緜上勛勞千古思浩興歸來吟不盡陶詩和後和豳詩第十一名方賞桐江徙居新城方德麟號藏六繞畦晴綠弄潺湲倚杖東風却黯然往夢更誰憐秀麥閒愁空自託啼鶻犂鉏相踵地力盡花栁無私春色偏白髮老農猶健在一蓑牛背聽鳴泉第十二名鄧草逕三山劉汝鈞君鼎號䝉山寓杭意圓語妥五六善冩物態用韻尢工年來夢斷百花場安分農桑萬慮降為喜麥青行暖逕因看蠶出倚晴忩草坪間見烏犍㸃畬水飛來白鷺雙滿飲茅柴􅂸爛醉踏歌社下自成腔第十三名魏子大武林九友㑹梁必大前四句詠題後乃述意末二句亦不離春興格韻甚髙五言中未易多得麥疇連草色蔬逕帶蕪痕布榖叫殘雨杏花開半村吾生老農圃世事付兒孫但遇芳菲景髙歌酒滿尊第十四名喻似之分水何教名鳴鳳字逢原語健意深雖首句疊字微欠推敲後聨與末韻過人矣東風轉矚又東臯久賦將蕪力未薅古木隂深巢燕弱荒陂水淺怒蛙豪兒癡方擬半栽秫身隠尚嫌全種桃何許蕨薇君欲采飢眠堪羡華山髙木一作屋第十五名躡雲建德梓州翁合老仲嘉春日雜興意已具首句二聨工緻後聨句更髙結句所引與興字相闗尤有深味韶華到處入㝠搜郭外人家事更幽土脈正融催觳觫林隂微合聽鈎輈誰家酒熟社公醉明日桑空蠶妾愁祇恐春工忙裏度又吟風雨滿城秋春工一作東風又吟風雨一作催租又迫第十六名玉華吟客分水林東岡名子明前聨細翫見田園次聨較分曉結意尤有含蓄一㸃陽和薰萬宇最饒佳致是山莊雞豚祝罷成長席鶯燕聽來隔短牆嗜酒不嫌多種秫無襦長恨少栽桑東郊勸相何煩爾農圃吾生自合忙第十七名田起東崑山劉䝉山此真雜興二聨組織甚工桑風吹緑滿原頭西崦東臯暖氣浮村婦祈蠶分麪絸老農占嵗説泥牛田烏飛逐畊烟犢桑扈鳴隨喚雨鳩鄰叟相邀同社飲旋將新酒向花篘叟一作曲第十八名唐楚友孤山社白湛淵名珽字廷玉前聨不束於題而栁處蛙時一聨題意俱足格調甚髙結亦不浮雨後散幽步村村社鼓鳴隂晴雖不定天地自分明栁處風無力蛙時水有聲幾朝寒食近吾事及躬畊第十九名識字畊夫武林社泰州周暕字伯陽號方山不事排奡而意語新妥自是佳作蛙聲似吹雨初足桑椹欲紅風始和少婦每憂蠶利薄老夫惟喜秫苗多舊栽花木山鶯識新買陂塘野鷺過此境東風元自好當年金谷事如何第二十名學古翁桐江趙必范號古一此巻八詩一起一結中六篇分詠三春節序曲盡田園間景態如元日云卜嵗聊慿六壬課有生未識五辛盤元夕云幸有漁樵同此樂苦無車馬自相諠社日云幾㸃飛花芳徑雨一雙新燕荻簾風清明云茭白生苗藏蛤地桑黄含椹浴蠶天皆佳句也今全録其首篇一嵗農功只在春夫夫婦婦幾艱辛青門舊有種瓜地緑埜新添躬稼人早把牛衣教諸子欲修蠶具問良辰夜來谷口東風過只恐逢人問子真第二十一名社翁釣臺姚潼翔壁冩新年百事昌春盤次第蓼芽香燒燈過了爭挑菜祭社歸來便撒秧布榖幾聲催耜畆吳蠶三伏正條桑一春忙過無多日又聽鸝鶊報麥黄第二十二名騎牛翁前婺教三山髙鎔聲玉號悦雲五六作意就雜字上形容畧似為氣格之累然而不可少也第二句頴拔末用淵明意尤佳已學淵明早賦歸東風吹醒夢中非鶯聲睍睆來談舊牛背安閒勝䇿肥時聽樵歌時牧笛間披道氅間農衣篇詩那可形容盡何似忘言對夕暉第二十三名天目山人義烏吳天祐姪㻦字貴叔全篇是雜興本色而田園叅貫其中且無一語塵腐野水渾邉戱乳鵞疎籬缺處晒耕蓑草青隨意牛羊卧門靜無人燕雀多夫倦倚犂需婦饁翁歡擊壤和孫歌新來别有營生計又喜巡檐住蜜窠第二十四名安定書隠義烏胡南字景山號比心二聨俱入細末意尤永世數有遷革田園無古今鳥喧爭樹暖牛倦憇牆隂水活土膏動風㣲花氣深淵明千古士佇立此時心第二十五名槐忩居士浦陽長塘黄景昌細潤中見雜興若知田園俜亭則有當進盧前矣野色搖春麥正肥烟村閒寂往還稀未多桑葉蠶初浴更小茅茨燕亦飛行市綠蛆花潑眼卧依黄犢草侵衣數聲桐角歸來晚楊栁移隂月半扉第二十六名姜仲澤金華名霖頷聨妥帖五六語尤勝末不雷同老盆傾酒試新嘗社鼓村村閙夕陽麥壟風㣲牛睡穏芹塘泥滑燕歸忙半村飛雨斷煙濕一逕落花流水香鼎貴安知此中意徒能學犬吠村莊第二十七名陳柔著武林社三村陳必曽字孝先號潮原終篇可謂清新之作三四尤有味噀緑郊原春事深治生幽趣豁塵襟聲聲禽語畊人意種種花開老圃心桑葉漸舒梯欲整麥苗暗長路難尋日長雖有荷鉏倦薄莫歸來常醉唫第二十八名方尚老桐江雲村方子静頷聨停當五六有感觸結三四字尤警東皋雨後土膏肥夙駕烏犍出短扉秧水平疇蛙閤閤菜花滿稜蝶飛飛比鄰社酒歡猶在牆壁農書事已非獨喜桑麻今正長淵明歸去最知幾第二十九名朱孟翁東陽平妥中用字有工二聨不拘體貼而題自見末感興深餖飣蔬槃已竹萌如何布榖未催畊牧兒懶散騎牛過逰子牽連信馬行秧際窺魚翹白鷺花間捎蝶下黄鶯東風嵗嵗添新緑獨我霜髯多幾莖第三十名愛雲仙友杭白雲社趙必拆一段佳山水芳時事正妍犢畊青燒雨鶴卧碧桃煙社老邀甞煮鄰僧伴摘鮮莫嫌陶令拙農圃得餘年事正作事事第三十一名陳希邵義烏陳舜道此巻首尾吟十篇題上生題摹寫各盡其妙與其他畫蛇添足者不同姑寘諸此以為手抄之冠紙價當為髙矣春來非是愛吟詩詩是田園漫興時無事花邉繙冊有時桑下課牛醫乍隨父老看秧去還共兒童闘草嬉偶物興懷渾不奈春來非是愛吟詩又春來非是愛吟詩詩是田園樂興時清入吟懷花月照紅生笑面栁風吹村聲盪耳烏鹽角社酒柔情玉練槌閒悶閒愁儂不省春來非是愛吟詩又春來非是愛吟詩詩是田園飲興時草酌乍舒情眊矂花生陡覺眼迷離才呼枌社人同醉又問杏邨家有誰長日作勞無不得春來非是愛吟詩又春來非是愛吟詩詩是田園懶興時放草地牛眠易熟聽花村鴂起來遲蠶桑辛苦從渠婦稼穡勤勞任我兒疎散情懷收不起春來非是愛吟詩又春來非是愛吟詩詩是田園引興時聞布榖聲驚緑野聽提壺語憶青旗曽因鬪草爭心起每為看花樂意隨景物撩人禁不定春來非是愛吟詩又春來非是愛吟詩詩是田園寄興時稼穡但慿牛犢健隂晴每付鵓鴣知託尋花去將予樂借卷桐吹寫所思撫景寓言良不淺春來非是愛吟詩又春來非是愛吟詩詩是田園乘興時得暇分畦秧韭菜趂晴樊圃樹棠梨山煙青笠等閒去沙地烏犍和醉騎一片野情羈不住春來非是愛吟詩又春來非是愛吟詩詩是田園遣興時行傍山翁驅犢父坐觀鄰嫗試鵞兒看秧時測水深淺行菜閒占春早遲白日漸長消不去春來非是愛吟詩又春來非是愛吟詩詩是田園盡興時蓐食出門天欲曙荷鉏歸路月相隨踏青漫有心情在畊緑寧甘體力疲箇段工夫償不足春來非是愛吟詩又春來非是愛吟詩詩是田園感興時草地畊牛才有犢花村吠犬那生氂麥青未必三時粥桑緑其如二月絲觸物興懷言不盡春來非是愛吟詩第三十二名劉時可雙溪前聨語圓味永後四句婉順而有結束土膏初動雨初收草逕茅亭趣最幽坐睡略無朝市夢踏歌時有里閭遊半丘秧秫醉堪酒五畝樹桑寒可裘老圃老農誠足學不成吾道付滄洲第三十三名岳重武林九友㑹寳覺寺僧了慧字岳重田園對起已占地步頷聨得闔闢之妙餘佳平疇水繞徑㣲分小圃雲深景不繁此處農桑雖是僻多情鶯燕不嫌村倦眠芳草閒黄犢靜對幽花倒綠樽見説弓旌方四出欲更名姓掩衡門第三十四名雲東老吟義烏許元發起善摹冩五六用淵明摩詰語却以第七句承之可謂得格片雲豈是出山時曽被東風誤一吹歸意不煩啼鴂勸閒情只許落花知桑麻窮巷扉長掩烟火空林秫自炊栗里輞川非謬計晴忩子細味渠詩第三十五名避世翁義烏洪貴叔全傚坡體棄官杜甫罹天寳辤令陶潛歎義熈暖日浣溪仍舊迹春風栗里只前時苗生阡陌培嘉種花繞林塘發故枝佳興二公能領㑹可能胸次太多詩第三十六名觀我金華楊舜舉有㸃檢無疎漏二聨能以俗為雅和根帶葉雖只舊對却轉移得好末押和陶更佳露畦煙陌裏名利等秋毫引犢隨牛放祈蠶望繭繰和根挑薺菜帶葉摘櫻桃讀罷歸來賦臨風欲和陶第三十七名徐端甫義烏居禪定如是而後為雜興詩中二聨尤得趣末無奇曉出東郊跨蹇驢弄晴㣲雨潤如酥犬依桑下烏犍卧鳩雜花間黄鳥呼楊栁嫩搖風氣力稻秧新著雨工夫農家滋味誰知得飽飫豚蹄酒一盂第三十八名龜潭朱釋老金華孝順鎮前聨説田園輕快第二句體貼興字五六帶春景體貼雜興二字更工然而氣