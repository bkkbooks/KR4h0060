body:
  text: 月泉吟社詩總集類提要臣等謹案月泉吟社詩一卷宋吳渭編渭字清翁號潛齊浦江人嘗官義烏令入元後退居吳溪立月泉吟社至元丙戌丁亥間徴賦春日田園雜興詩限五七言律體以嵗前十月分題次嵗上元收卷凡收二千七百三十五卷延致方鳯謝翺吳思齊評其甲乙凡選二百八十人以三月三日揭榜此本僅載前六十人共詩七十四首又附録句圖三十二聨而第十八聨佚其名蓋後人節録之本非完書也其人皆用寓名而别注本名於其下如第一名連文鳯改稱羅公福之類未詳其意豈鳯等校閲之時欲示公論以此代糊名耶首載社約題意誓文詩評次列六十人之詩各有評論次為摘句次為賞格及送賞啓次為諸人覆啓亦皆節文其人大抵宋之遺老故多寓遁世之意及聽杜鵑餐薇蕨語王士禎池北偶談稱其清新尖刻别自一家而怪所品髙下未當為移第六名子進為第一第十三名魏子大為第二第九名全泉翁為第三第五名山南隱逸為第四第十五名躡雲為第五第四名仙村人為第六第十一名方賞為第七第三名髙寧為第八第四十二名俞自得為第九第二十五名槐空居士為第十第四十三名東湖散人為十一第三十七名徐端甫為十二第四十四名仇近村為十三第三十一名陳希邵為十四第五十三名子直為十五第二名司馬澄翁為十六第四十五名陳緯孫為十七第五十一名聞人仲伯為十八第五十九名君瑞為十九第十七名田起東為二十第一名羅公福為二十一然諸詩風格相近無大優劣士禎所移與鳯等所定均各隨一時之興未見此之必是彼之必非也李東陽懷麓堂詩話曰元季國初東南人士重詩社每一有力者為主聘詩人為考官隔嵗封題於諸郡之能詩者期以明春集卷私試開榜次名仍刻其優者略如科舉之法今世所傳惟浦江吳氏月泉吟社取羅公福為首其所刻詩以和平溫厚為主無甚警拔而卷中亦無能過之者云云則鳯等所定東陽固以為允矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀月泉吟社詩原序月泉吟社者浦江吳子之所作也吳子名渭字清翁其號潛齊按重本有邑人黃灝首序序渭故宋時嘗為義烏令元初退食于吳溪延致鄉遺老方韶父與閩謝臯羽括吳思齊主于家始作月泉吟社四方吟士從之三子者乃為其評較揭賞云據録有刻本逮從于集賢學士直方并其子貞文公萊及諸孫元帥輩相嗣傳焉中更兵燹是本泯沒其裔孫克文㑹金華錢世淵獲舊所刻本復重刻焉蓋正統十年春月之日也有長史義門鄭楷教諭文江張用並叙諸末云石洲王子攜至江右間以授豫其詩多律五七言四韻近體其詞婉微其氣平淡其音清翕雖不逮唐制若曰元初
